<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#1B6EF3"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="POUP"/>
  <title>POUP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;width:100%}
    body{font-family:'Outfit',sans-serif;background:#F1F5F9;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    ::-webkit-scrollbar{width:0;height:0}
    input,button,textarea,select{font-family:'Outfit',sans-serif}
    button{cursor:pointer;-webkit-tap-highlight-color:transparent}
    textarea{resize:none}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideInRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
    .page{animation:slideInRight .2s ease}
    .sheet{animation:slideUp .25s ease}

    /* Desktop layout */
    @media(min-width:768px){
      .app-layout{display:flex!important;flex-direction:row!important}
      .sidebar{display:flex!important}
      .bottom-nav{display:none!important}
      .main-content{padding-bottom:0!important}
      .grid-2{display:grid!important;grid-template-columns:1fr 1fr!important;gap:16px}
      .grid-3{display:grid!important;grid-template-columns:1fr 1fr 1fr!important;gap:16px}
      .grid-4{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:16px}
      .grid-report-cards{display:grid!important;grid-template-columns:repeat(auto-fill,minmax(320px,1fr))!important;gap:16px}
      .wizard-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:20px}
      .wizard-grid-full{grid-column:1/-1}
      .detail-grid{display:grid!important;grid-template-columns:1fr 340px!important;gap:20px}
      .detail-kpi-grid{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:12px}
      .settings-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:16px}
      .settings-full{grid-column:1/-1}
      .home-grid{display:grid!important;grid-template-columns:1fr 340px!important;gap:20px}
      .home-kpi-grid{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:16px}
      .commission-kpi{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:16px}
      .commission-dist{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:16px}
      .summary-grid{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:16px}
      .topbar{display:flex!important}
    }
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef,createContext,useContext}=React;

/* ─── THEME ─────────────────────────────────────────────── */
const G={
  navy:'#0D1B2E',navy3:'#1A2E4A',
  blue:'#1B6EF3',blueL:'#3B82F6',blueDark:'#0D4ED8',blueGlow:'rgba(27,110,243,0.18)',
  gold:'#F0A500',green:'#10B981',amber:'#F59E0B',rose:'#F43F5E',teal:'#0DAFA0',
  white:'#FFFFFF',slate50:'#F8FAFC',slate100:'#F1F5F9',slate200:'#E2E8F0',
  slate400:'#94A3B8',slate500:'#64748B',slate600:'#475569',slate700:'#334155',
  slate800:'#1E293B',slate900:'#0F172A',
};

/* ─── UTILS ──────────────────────────────────────────────── */
const fmt=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:0,maximumFractionDigits:0});
const parseBRL=s=>{if(typeof s==='number')return s;return parseFloat(String(s).replace(/\./g,'').replace(',','.'))||0;};
const calcVencAnual=(venc,ano)=>{if(!venc)return'';try{const p=venc.trim().split('/');if(p.length===2&&!isNaN(p[1])){return p[0]+'/'+( parseInt(p[1])+ano);}}catch{}return'Ano '+ano;};
const fmtDate=iso=>{if(!iso)return'—';try{return new Date(iso).toLocaleDateString('pt-BR');}catch{return iso;}};
const calcRisk=({price,financing,subsidy,fgts,discountPct=0,riskThreshold=30})=>{
  const p=parseBRL(price),disc=p*(parseBRL(discountPct)/100),adj=Math.max(p-disc,0);
  const fin=parseBRL(financing)+parseBRL(subsidy)+parseBRL(fgts),poup=Math.max(adj-fin,0);
  const limit=(riskThreshold/100)*adj,isHigh=poup>limit,riskPct=adj>0?Math.round((poup/adj)*100):0;
  return{adjustedPrice:adj,discount:disc,totalFin:fin,poupanca:poup,isHigh,riskPct,limit};
};
const calcMonthly=({poupanca,sinal,parcelas})=>Math.max((poupanca-parseBRL(sinal))/(parseInt(parcelas)||1),0);

function useLS(key,init){
  const[v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key,v]);
  return[v,setV];
}

/* ─── SEED DATA ──────────────────────────────────────────── */
const SR=[
  {id:1,emp:'Palazzo Residências',client:'Rafael Silveira',email:'rafael@email.com',phone:'(11) 99812-4401',unit:'Torre A — Ap 1402',imob:'Elite Imóveis SP',price:980000,financing:680000,subsidy:45000,fgts:35000,sinal:50000,parcelas:180,risk:false,date:'2025-01-14',city:'São Paulo'},
  {id:2,emp:'Reserva das Flores',client:'Mariana Costa',email:'mariana@email.com',phone:'(21) 98765-3300',unit:'Bloco B — Lote 08',imob:'Costa & Faria',price:380000,financing:210000,subsidy:30000,fgts:20000,sinal:20000,parcelas:240,risk:true,date:'2025-01-08',city:'Rio de Janeiro'},
  {id:3,emp:'Grand Recanto',client:'Thiago Mendonça',email:'thiago@email.com',phone:'(31) 99001-2200',unit:'Bl. C — Ap 302',imob:'MG Premium',price:620000,financing:420000,subsidy:28000,fgts:40000,sinal:35000,parcelas:200,risk:false,date:'2025-01-03',city:'Belo Horizonte'},
  {id:4,emp:'Villagio Novo',client:'Carla Drummond',email:'carla@email.com',phone:'(85) 98234-6600',unit:'Ap 701 — Torre 2',imob:'Norte Imóveis',price:290000,financing:150000,subsidy:25000,fgts:15000,sinal:15000,parcelas:120,risk:true,date:'2024-12-28',city:'Fortaleza'},
];
const SS=[
  {id:1,emp:'Palazzo Residências',client:'Rafael Silveira',price:980000,pct:3,status:'paga',date:'14/01/2025'},
  {id:2,emp:'Reserva das Flores',client:'Mariana Costa',price:380000,pct:2.5,status:'aprovada',date:'08/01/2025'},
  {id:3,emp:'Grand Recanto',client:'Thiago Mendonça',price:620000,pct:3,status:'paga',date:'03/01/2025'},
  {id:4,emp:'Villagio Novo',client:'Carla Drummond',price:290000,pct:2,status:'pendente',date:'28/12/2024'},
];
const SRM=[
  {id:1,title:'Visita — Palazzo Residências',desc:'Decorado para Rafael',priority:'alta',done:false,date:'22 Jan'},
  {id:2,title:'Proposta CAIXA — Reserva',desc:'Enviar documentação',priority:'alta',done:false,date:'23 Jan'},
  {id:3,title:'Reunião equipe',desc:'Planejamento trimestral',priority:'media',done:false,date:'25 Jan'},
  {id:4,title:'Escritura — Grand Recanto',desc:'Thiago Mendonça',priority:'baixa',done:true,date:'18 Jan'},
];
const SSET={name:'João Corretor',imob:'Elite Imóveis SP',riskThreshold:30,notifications:true,commissionPct:3};

/* ─── CONTEXT ────────────────────────────────────────────── */
const Ctx=createContext(null);
function AppProvider({children}){
  const[reports,setReports]=useLS('ca:reports',SR);
  const[sales,setSales]=useLS('ca:sales',SS);
  const[reminders,setReminders]=useLS('ca:reminders',SRM);
  const[settings,setSettings]=useLS('ca:settings',SSET);
  const addReport=r=>setReports(p=>[{...r,id:Date.now()},...p]);
  const delReport=id=>setReports(p=>p.filter(r=>r.id!==id));
  const addSale=s=>setSales(p=>[{...s,id:Date.now()},...p]);
  const updateSaleStatus=(id,st)=>setSales(p=>p.map(s=>s.id===id?{...s,status:st}:s));
  const delSale=id=>setSales(p=>p.filter(s=>s.id!==id));
  const addReminder=r=>setReminders(p=>[{...r,id:Date.now(),done:false},...p]);
  const toggleReminder=id=>setReminders(p=>p.map(r=>r.id===id?{...r,done:!r.done}:r));
  const delReminder=id=>setReminders(p=>p.filter(r=>r.id!==id));
  const updateSettings=patch=>setSettings(p=>({...p,...patch}));
  const totalComm=sales.reduce((a,s)=>a+s.price*s.pct/100,0);
  const paidComm=sales.filter(s=>s.status==='paga').reduce((a,s)=>a+s.price*s.pct/100,0);
  const pendComm=sales.filter(s=>s.status!=='paga'&&s.status!=='cancelada').reduce((a,s)=>a+s.price*s.pct/100,0);
  return<Ctx.Provider value={{reports,addReport,delReport,sales,addSale,updateSaleStatus,delSale,reminders,addReminder,toggleReminder,delReminder,settings,updateSettings,totalComm,paidComm,pendComm}}>{children}</Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

/* ─── UI ATOMS ───────────────────────────────────────────── */
const Tag=({label,bg,text='#fff',size=11})=>
  <span style={{background:bg,color:text,fontSize:size,fontWeight:700,padding:'3px 10px',borderRadius:99,whiteSpace:'nowrap'}}>{label}</span>;

const Avatar=({name='?',size=40,color=G.blue})=>{
  const i=name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return<div style={{width:size,height:size,borderRadius:size/2,background:`${color}20`,border:`2px solid ${color}40`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontWeight:900,fontSize:size*0.36,color,userSelect:'none'}}>{i}</div>;
};

const Ring=({pct=0,size=60,stroke=6,color=G.blue})=>{
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,dash=(Math.min(pct,100)/100)*circ;
  return<div style={{position:'relative',width:size,height:size,flexShrink:0}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={G.slate200} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"/>
    </svg>
    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <span style={{fontSize:size>56?13:11,fontWeight:900,color:G.slate800}}>{pct}%</span>
    </div>
  </div>;
};

const Card=({children,style:sx={}})=>
  <div style={{background:G.white,borderRadius:16,border:`1px solid ${G.slate200}`,boxShadow:'0 1px 6px rgba(0,0,0,0.05)',...sx}}>{children}</div>;

const SLabel=({children,action})=>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
    <span style={{fontSize:10,fontWeight:800,color:G.blue,textTransform:'uppercase',letterSpacing:1.2}}>{children}</span>
    {action}
  </div>;

const DR=({label,value,hl,accent,last})=>
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:hl?'8px 12px':'7px 0',background:hl?`${G.blue}0D`:'transparent',borderRadius:hl?8:0,borderBottom:!hl&&!last?`1px solid ${G.slate100}`:'none',gap:8}}>
    <span style={{fontSize:12,color:G.slate500,flexShrink:0}}>{label}</span>
    <span style={{fontSize:13,fontWeight:hl?800:600,color:accent||(hl?G.blue:G.slate800),textAlign:'right'}}>{value}</span>
  </div>;

function Field({label,value,onChange,prefix,suffix,placeholder='',type='text',hint,required,multiline}){
  const[focused,setF]=useState(false);
  return<div style={{marginBottom:14}}>
    <label style={{display:'block',fontSize:11,fontWeight:700,color:focused?G.blue:G.slate500,textTransform:'uppercase',letterSpacing:0.6,marginBottom:5}}>
      {label}{required&&<span style={{color:G.rose}}> *</span>}
    </label>
    <div style={{display:'flex',alignItems:multiline?'flex-start':'center',border:`1.5px solid ${focused?G.blue:G.slate200}`,borderRadius:10,background:focused?`${G.blue}04`:G.white,transition:'all .15s',overflow:'hidden'}}>
      {prefix&&<span style={{padding:'0 4px 0 12px',color:G.slate400,fontSize:13,flexShrink:0}}>{prefix}</span>}
      {multiline
        ?<textarea value={value} placeholder={placeholder} onChange={e=>onChange?.(e.target.value)} onFocus={()=>setF(true)} onBlur={()=>setF(false)} style={{flex:1,border:'none',outline:'none',padding:'10px 12px',fontSize:14,color:G.slate800,background:'transparent',fontFamily:'Outfit,sans-serif',lineHeight:1.5,minHeight:80}}/>
        :<input type={type} value={value} placeholder={placeholder} onChange={e=>onChange?.(e.target.value)} onFocus={()=>setF(true)} onBlur={()=>setF(false)} style={{flex:1,border:'none',outline:'none',padding:'12px 12px',fontSize:14,color:G.slate800,background:'transparent',fontFamily:'Outfit,sans-serif'}}/>
      }
      {suffix&&<span style={{padding:'0 12px 0 4px',color:G.slate400,fontSize:12,flexShrink:0}}>{suffix}</span>}
    </div>
    {hint&&<div style={{fontSize:11,color:G.green,marginTop:4,fontWeight:500}}>{hint}</div>}
  </div>;
}

function Btn({label,onClick,variant='primary',disabled,icon,size='md',fullWidth=false,style:sx={}}){
  const[pressed,setP]=useState(false);
  const v={
    primary:{bg:G.blue,text:'#fff',border:'none',shadow:`0 4px 12px ${G.blueGlow}`},
    secondary:{bg:'transparent',text:G.blue,border:`1.5px solid ${G.blue}`,shadow:'none'},
    ghost:{bg:G.slate100,text:G.slate700,border:'none',shadow:'none'},
    danger:{bg:G.rose,text:'#fff',border:'none',shadow:'none'},
    gold:{bg:G.gold,text:'#fff',border:'none',shadow:'none'},
  }[variant]||{};
  const py=size==='sm'?8:size==='lg'?16:12;
  return<button onClick={onClick} disabled={disabled}
    onMouseDown={()=>setP(true)} onMouseUp={()=>setP(false)} onMouseLeave={()=>setP(false)}
    onTouchStart={()=>setP(true)} onTouchEnd={()=>setP(false)}
    style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:7,padding:`${py}px ${size==='sm'?14:18}px`,borderRadius:11,border:v.border,background:v.bg,color:v.text,fontSize:size==='sm'?12:14,fontWeight:700,cursor:disabled?'not-allowed':'pointer',boxShadow:v.shadow,opacity:disabled?0.45:pressed?0.82:1,transform:pressed?'scale(0.97)':'scale(1)',transition:'all .12s',fontFamily:'Outfit,sans-serif',width:fullWidth?'100%':'auto',whiteSpace:'nowrap',...sx}}>
    {icon&&<span>{icon}</span>}{label}
  </button>;
}

function Toggle({label,sub,value,onChange}){
  return<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 0',borderBottom:`1px solid ${G.slate100}`}}>
    <div><div style={{fontSize:14,fontWeight:600,color:G.slate800}}>{label}</div>{sub&&<div style={{fontSize:11,color:G.slate500,marginTop:1}}>{sub}</div>}</div>
    <button onClick={()=>onChange?.(!value)} style={{width:46,height:26,borderRadius:13,background:value?G.blue:G.slate300,position:'relative',border:'none',cursor:'pointer',transition:'background .2s',flexShrink:0}}>
      <div style={{width:22,height:22,borderRadius:11,background:'#fff',position:'absolute',top:2,left:value?22:2,transition:'left .2s',boxShadow:'0 1px 4px rgba(0,0,0,0.2)'}}/>
    </button>
  </div>;
}

/* Bottom Sheet Modal - feels native on mobile */
function Sheet({open,onClose,title,children}){
  if(!open)return null;
  return<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',flexDirection:'column',justifyContent:'flex-end',animation:'fadeIn .15s'}} onClick={e=>e.target===e.currentTarget&&onClose?.()}>
    <div className="sheet" style={{background:G.white,borderRadius:'22px 22px 0 0',maxHeight:'92vh',display:'flex',flexDirection:'column',paddingBottom:'env(safe-area-inset-bottom)'}}>
      <div style={{padding:'16px 20px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${G.slate100}`,flexShrink:0}}>
        <span style={{fontSize:16,fontWeight:800,color:G.slate900}}>{title}</span>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:16,background:G.slate100,border:'none',fontSize:16,color:G.slate600,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>
      <div style={{overflowY:'auto',padding:'18px 20px 24px',flex:1,WebkitOverflowScrolling:'touch'}}>{children}</div>
    </div>
  </div>;
}

function Confirm({open,title,message,onConfirm,onCancel}){
  if(!open)return null;
  return<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:2000,padding:'0 0',animation:'fadeIn .15s'}}>
    <div style={{background:G.white,borderRadius:'22px 22px 0 0',padding:'24px 24px 32px',width:'100%',maxWidth:480,boxShadow:'0 -8px 40px rgba(0,0,0,0.15)',paddingBottom:'calc(24px + env(safe-area-inset-bottom))'}}>
      <div style={{fontSize:17,fontWeight:800,color:G.slate900,marginBottom:8}}>{title}</div>
      {message&&<div style={{fontSize:13,color:G.slate500,marginBottom:24,lineHeight:1.5}}>{message}</div>}
      <div style={{display:'flex',gap:10}}>
        <Btn label="Cancelar" variant="ghost" onClick={onCancel} fullWidth/>
        <Btn label="Confirmar" variant="danger" onClick={onConfirm} fullWidth/>
      </div>
    </div>
  </div>;
}

const Empty=({icon,title,sub,action})=>
  <div style={{textAlign:'center',padding:'60px 20px'}}>
    <div style={{fontSize:48,marginBottom:14}}>{icon}</div>
    <div style={{fontSize:16,fontWeight:700,color:G.slate500,marginBottom:6}}>{title}</div>
    {sub&&<div style={{fontSize:13,color:G.slate400,marginBottom:20,lineHeight:1.5}}>{sub}</div>}
    {action&&<div style={{display:'flex',justifyContent:'center'}}>{action}</div>}
  </div>;

const StepBar=({step,total=4,labels=[]})=>
  <div style={{display:'flex',gap:6,marginBottom:24}}>
    {Array.from({length:total}).map((_,i)=>
      <div key={i} style={{flex:1}}>
        <div style={{height:4,borderRadius:2,background:i<step?G.blue:G.slate200,marginBottom:4,transition:'background .3s'}}/>
        {labels[i]&&<div style={{fontSize:9,fontWeight:700,color:i<step?G.blue:G.slate400,textTransform:'uppercase',letterSpacing:0.5}}>{labels[i]}</div>}
      </div>
    )}
  </div>;

/* ─── BOTTOM NAV (mobile) ─────────────────────────────────── */
const NAV=[
  {key:'home',icon:'⊞',label:'Início'},
  {key:'reports',icon:'📋',label:'Propostas'},
  {key:'commissions',icon:'💰',label:'Comissões'},
  {key:'reminders',icon:'⏰',label:'Agenda'},
  {key:'settings',icon:'⚙️',label:'Config'},
];

function BottomNav({screen,onNav}){
  const isActive=k=>screen===k||(screen==='newReport'&&k==='reports')||(screen==='reportDetail'&&k==='reports');
  return<nav className="bottom-nav" style={{position:'fixed',bottom:0,left:0,right:0,background:G.white,borderTop:`1px solid ${G.slate200}`,display:'flex',zIndex:500,paddingBottom:'env(safe-area-inset-bottom)',boxShadow:'0 -4px 20px rgba(0,0,0,0.06)'}}>
    {NAV.map(({key,icon,label})=>{
      const active=isActive(key);
      return<button key={key} onClick={()=>onNav(key)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,padding:'10px 4px 8px',border:'none',background:'transparent',transition:'background .15s',position:'relative'}}>
        <span style={{fontSize:20,filter:active?'none':'grayscale(0.5) opacity(0.45)',lineHeight:1}}>{icon}</span>
        <span style={{fontSize:9,fontWeight:active?800:500,color:active?G.blue:G.slate400,letterSpacing:0.2}}>{label}</span>
        {active&&<div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',width:20,height:3,borderRadius:'3px 3px 0 0',background:G.blue}}/>}
      </button>;
    })}
  </nav>;
}

/* ─── SIDEBAR (desktop only, hidden on mobile via CSS) ─────── */
function Sidebar({screen,onNav,settings,col,setCol}){
  const isA=k=>screen===k||(screen==='newReport'&&k==='reports')||(screen==='reportDetail'&&k==='reports');
  return<aside className="sidebar" style={{display:'none',width:col?64:220,background:G.navy,flexDirection:'column',flexShrink:0,transition:'width .25s',overflow:'hidden',height:'100vh',position:'sticky',top:0,zIndex:100}}>
    <div style={{padding:col?'18px 0':'18px 20px',display:'flex',alignItems:'center',gap:12,borderBottom:'1px solid rgba(255,255,255,0.06)',justifyContent:col?'center':'flex-start',height:64,flexShrink:0}}>
      <div style={{width:36,height:36,borderRadius:10,background:G.blue,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🏠</div>
      {!col&&<div><div style={{fontSize:16,fontWeight:900,color:'#fff',letterSpacing:-0.3}}>POUP</div><div style={{fontSize:9,color:'rgba(255,255,255,0.35)',textTransform:'uppercase',letterSpacing:1}}>Gestão Imobiliária</div></div>}
    </div>
    <nav style={{flex:1,padding:'10px 0'}}>
      {NAV.map(({key,icon,label})=>{
        const active=isA(key);
        return<button key={key} onClick={()=>onNav(key)} title={col?label:undefined}

            <div style={{fontSize:10,color:G.slate500,marginTop:2}}>{l}</div>
          </Card>
        )}
      </div>
      {/* Risk */}
      <Card style={{padding:'18px',marginBottom:12}}>
        <SLabel>Análise de Risco</SLabel>
        <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:12}}>
          <Ring pct={riskPct} color={r.risk?G.amber:G.green} size={66} stroke={6}/>
          <div style={{flex:1}}>
            <div style={{padding:'8px 12px',background:r.risk?`${G.amber}12`:`${G.green}12`,borderRadius:10,border:`1px solid ${r.risk?G.amber+'44':G.green+'44'}`}}>
              <div style={{fontSize:13,fontWeight:800,color:r.risk?G.amber:G.green}}>{r.risk?'⚠ Poupança Elevada':'✓ Risco OK'}</div>
              <div style={{fontSize:11,color:G.slate600,marginTop:2}}>{riskPct}% do valor do imóvel</div>
            </div>
          </div>
        </div>
        <DR label="Financiamento" value={fmt(r.financing)}/>
        <DR label="Subsídio" value={fmt(r.subsidy)}/>
        <DR label="FGTS" value={fmt(r.fgts)}/>
        <DR label="Total financiado" value={fmt(totalFin)} hl/>
        <DR label="Poupança necessária" value={fmt(poup)} hl accent={r.risk?G.amber:G.green} last/>
      </Card>
      {/* Parcelas */}
      <Card style={{padding:'18px',marginBottom:12}}>
        <SLabel>Parcelamento</SLabel>
        <DR label="Sinal" value={fmt(r.sinal)}/>
        <DR label="Saldo a parcelar" value={fmt(Math.max(poup-r.sinal,0))}/>
        {r.vencimento&&<DR label="Vencimento 1ª Parcela" value={r.vencimento}/>}
        <DR label={r.parcelas+'× parcelas mensais'} value={fmt(monthly)} hl accent={G.blue} last={!r.intermediarias||r.intermediarias.length===0}/>
        {r.intermediarias&&r.intermediarias.map((intr,i)=><DR key={intr.id} label={'Interm. Ano '+intr.ano+(intr.venc?' — '+intr.venc:'')} value={fmt(parseBRL(intr.valor))} last={i===r.intermediarias.length-1}/>)}
      </Card>
      {/* Contato */}
      <Card style={{padding:'18px',marginBottom:14}}>
        <SLabel>Dados do Cliente</SLabel>
        {r.email&&<DR label="Email" value={r.email}/>}
        {r.phone&&<DR label="Telefone" value={r.phone}/>}
        {r.imob&&<DR label="Imobiliária" value={r.imob}/>}
        <DR label="Data" value={fmtDate(r.date)} last/>
      </Card>
    </div>
    <Confirm open={confirmDel} title="Excluir proposta?" message="Essa ação não pode ser desfeita." onConfirm={()=>{delReport(r.id);onBack();}} onCancel={()=>setConfirmDel(false)}/>
    <Confirm open={confirmVenda} title="Registrar Venda?" message={"Comissão de "+fmt(r.price*(settings.commissionPct||3)/100)+" será lançada como aprovada."} onConfirm={()=>{addSale({emp:r.emp,client:r.client,price:r.price,pct:settings.commissionPct||3,status:'aprovada',date:new Date().toLocaleDateString('pt-BR')});setVendaOk(true);setConfirmVenda(false);}} onCancel={()=>setConfirmVenda(false)}/>
  </div>;
}

        <div className="grid-2" style={{display:'flex',gap:10}}>

              <button onClick={()=>{const ano=form.intermediarias.length+1;const venc=calcVencAnual(form.vencimento,ano);set('intermediarias')([...form.intermediarias,{id:Date.now(),ano,venc,valor:''}]);}} style={{background:G.blue,border:'none',borderRadius:8,padding:'6px 14px',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Outfit,sans-serif'}}>＋ Adicionar</button>

            <Avatar name={form.client||'C'} size={52} color={G.blueL}/>

/* ─── COMMISSIONS ─────────────────────────────────────────── */
const SC={paga:{label:'Paga',bg:G.green},aprovada:{label:'Aprovada',bg:G.blue},pendente:{label:'Pendente',bg:G.amber},cancelada:{label:'Cancelada',bg:G.rose}};

  const{sales,addSale,updateSaleStatus,delSale,totalComm,paidComm,pendComm}=useApp();

  const filtered=filter==='todas'?sales:sales.filter(s=>s.status===filter);

                <Tag label={SC[s].label} bg={SC[s].bg}/>

            <div style={{display:'flex',justifyContent:'space-between',background:G.slate50,borderRadius:10,padding:'10px 12px'}}>

          </Card>
        )}
    </div>
    <Sheet open={sheet} onClose={()=>setSheet(false)} title="Registrar Nova Venda">
      <Field label="Empreendimento" value={form.emp} onChange={set('emp')} required/>
      <Field label="Cliente" value={form.client} onChange={set('client')}/>
      <Field label="Valor do Imóvel" value={form.price} onChange={set('price')} prefix="R$" required/>
      <div className="grid-2" style={{display:'block'}}>
        <Field label="Taxa de Comissão (%)" value={form.pct} onChange={set('pct')} suffix="%" hint={form.price&&form.pct?`Comissão: ${fmt(parseBRL(form.price)*parseFloat(form.pct)/100)}`:''}/>
        <Field label="Data" value={form.date} onChange={set('date')} placeholder={new Date().toLocaleDateString('pt-BR')}/>
      </div>
      <Btn label="Salvar Venda" onClick={handleAdd} disabled={!form.emp||!form.price} fullWidth/>
    </Sheet>
    <Confirm open={!!confirmId} title="Excluir venda?" message="Essa ação não pode ser desfeita." onConfirm={()=>{delSale(confirmId);setConfirmId(null);}} onCancel={()=>setConfirmId(null)}/>
  </div>;
}

/* ─── REMINDERS ───────────────────────────────────────────── */
const PR={alta:{label:'Alta',color:G.rose},media:{label:'Média',color:G.amber},baixa:{label:'Baixa',color:G.teal}};
function RemindersScreen(){
  const{reminders,addReminder,toggleReminder,delReminder}=useApp();
  const[sheet,setSheet]=useState(false);
  const[form,setForm]=useState({title:'',desc:'',date:'',priority:'media'});
  const[confirmId,setConfirmId]=useState(null);
  const set=k=>v=>setForm(f=>({...f,[k]:v}));
  const handleAdd=()=>{if(!form.title.trim())return;addReminder({...form});setForm({title:'',desc:'',date:'',priority:'media'});setSheet(false);};
  const pending=reminders.filter(r=>!r.done),completed=reminders.filter(r=>r.done);
  const RCard=({r})=>
    <div style={{background:G.white,borderRadius:14,padding:'14px 16px',border:`1.5px solid ${r.done?G.slate200:PR[r.priority]?.color+'33'||G.slate200}`,marginBottom:8,display:'flex',gap:12,alignItems:'flex-start',opacity:r.done?0.6:1,boxShadow:r.done?'none':'0 1px 6px rgba(0,0,0,0.05)'}}>
      <button onClick={()=>toggleReminder(r.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:24,padding:0,flexShrink:0,lineHeight:1,marginTop:1}}>{r.done?'✅':'⭕'}</button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:r.desc?5:0}}>
          <div style={{fontSize:14,fontWeight:700,color:G.slate900,textDecoration:r.done?'line-through':'none',flex:1}}>{r.title}</div>
          <Tag label={PR[r.priority]?.label||r.priority} bg={PR[r.priority]?.color||G.slate400} size={10}/>
        </div>
        {r.desc&&<div style={{fontSize:12,color:G.slate500,lineHeight:1.4,marginTop:3}}>{r.desc}</div>}
        {r.date&&<div style={{fontSize:11,color:G.slate400,marginTop:5}}>📅 {r.date}</div>}
      </div>
      <button onClick={()=>setConfirmId(r.id)} style={{background:'none',border:'none',fontSize:16,color:G.slate300,cursor:'pointer',flexShrink:0,paddingTop:2}}>✕</button>
    </div>;
  return<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <PageHeader title="Agenda" sub={`${pending.length} pendente${pending.length!==1?'s':''}`} right={
      <button onClick={()=>setSheet(true)} style={{width:38,height:38,borderRadius:19,background:G.amber,border:'none',color:'#fff',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 3px 10px ${G.amber}44`}}>＋</button>
    }/>
    <div className="page" style={{flex:1,overflowY:'auto',padding:'14px 16px',paddingBottom:100,WebkitOverflowScrolling:'touch'}}>
      {reminders.length===0&&<Empty icon="⏰" title="Nenhum lembrete" sub="Crie lembretes para acompanhar seus negócios" action={<Btn label="+ Novo Lembrete" onClick={()=>setSheet(true)}/>}/>}
      {pending.length>0&&<><div style={{fontSize:11,fontWeight:800,color:G.slate500,textTransform:'uppercase',letterSpacing:0.7,marginBottom:10}}>Pendentes ({pending.length})</div>{pending.map(r=><RCard key={r.id} r={r}/>)}</>}
      {completed.length>0&&<><div style={{fontSize:11,fontWeight:800,color:G.slate400,textTransform:'uppercase',letterSpacing:0.7,margin:'20px 0 10px'}}>Concluídos ({completed.length})</div>{completed.map(r=><RCard key={r.id} r={r}/>)}</>}
    </div>
    <Sheet open={sheet} onClose={()=>setSheet(false)} title="Novo Lembrete">
      <Field label="Título" value={form.title} onChange={set('title')} placeholder="Ex: Ligar para Rafael" required/>
      <Field label="Descrição" value={form.desc} onChange={set('desc')} placeholder="Detalhes..." multiline/>
      <Field label="Data" value={form.date} onChange={set('date')} placeholder="Ex: 25 Jan"/>
      <div style={{marginBottom:20}}>
        <label style={{display:'block',fontSize:11,fontWeight:700,color:G.slate500,textTransform:'uppercase',letterSpacing:0.6,marginBottom:8}}>Prioridade</label>
        <div style={{display:'flex',gap:8}}>
          {['alta','media','baixa'].map(p=>
            <button key={p} onClick={()=>set('priority')(p)} style={{flex:1,padding:'11px',borderRadius:10,border:`2px solid ${form.priority===p?PR[p].color:G.slate200}`,background:form.priority===p?PR[p].color+'18':'transparent',color:form.priority===p?PR[p].color:G.slate500,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Outfit,sans-serif',transition:'all .15s'}}>{PR[p].label}</button>
          )}
        </div>
      </div>
      <Btn label="Salvar Lembrete" onClick={handleAdd} disabled={!form.title.trim()} fullWidth/>
    </Sheet>
    <Confirm open={!!confirmId} title="Excluir lembrete?" onConfirm={()=>{delReminder(confirmId);setConfirmId(null);}} onCancel={()=>setConfirmId(null)}/>
  </div>;
}

/* ─── SETTINGS ────────────────────────────────────────────── */
function SettingsScreen(){
  const{settings,updateSettings,reports,sales}=useApp();
  const[name,setName]=useState(settings.name||'');
  const[imob,setImob]=useState(settings.imob||'');
  const[risk,setRisk]=useState(String(settings.riskThreshold||30));
  const[commPct,setCommPct]=useState(String(settings.commissionPct||3));
  const[saved,setSaved]=useState(false);
  const save=()=>{updateSettings({name,imob,riskThreshold:parseFloat(risk)||30,commissionPct:parseFloat(commPct)||3});setSaved(true);setTimeout(()=>setSaved(false),2500);};
  return<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <PageHeader title="Configurações"/>
    <div className="page" style={{flex:1,overflowY:'auto',padding:'16px',paddingBottom:100,WebkitOverflowScrolling:'touch'}}>
      {/* Profile */}
      <div style={{background:`linear-gradient(135deg,${G.navy},${G.navy3})`,borderRadius:20,padding:'22px 20px',marginBottom:14,display:'flex',gap:16,alignItems:'center'}}>
        <Avatar name={settings.name||'C'} size={60} color={G.gold}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:18,fontWeight:900,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{settings.name||'Corretor'}</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',marginTop:3}}>{settings.imob||'—'}</div>
          <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
            <Tag label="✦ Plano Pro" bg={G.gold}/>
            <Tag label={`${reports.length} propostas`} bg="rgba(255,255,255,0.1)" size={10}/>
            <Tag label={`${sales.length} vendas`} bg="rgba(255,255,255,0.1)" size={10}/>
          </div>
        </div>
      </div>
      <div className="settings-grid" style={{display:'block'}}>
        <Card style={{padding:'18px',marginBottom:12}}>
          <SLabel>Perfil</SLabel>
          <Field label="Seu Nome" value={name} onChange={setName} placeholder="João Corretor"/>
          <Field label="Imobiliária Padrão" value={imob} onChange={setImob} hint="Preenchido automaticamente em novas propostas"/>
          <Field label="Limiar de Risco (%)" value={risk} onChange={setRisk} suffix="%"/>
          <Field label="Comissão Padrão (%)" value={commPct} onChange={setCommPct} suffix="%" hint="Base para cálculo automático nas propostas"/>
          <Btn label={saved?'✓ Salvo!':'Salvar Alterações'} onClick={save} variant={saved?'gold':'primary'} fullWidth/>
        </Card>
        <Card style={{padding:'18px',marginBottom:12}}>
          <SLabel>Preferências</SLabel>
          <Toggle label="🔔 Notificações" sub="Alertas de propostas e lembretes" value={settings.notifications} onChange={v=>updateSettings({notifications:v})}/>
          <Toggle label="📊 Relatórios automáticos" sub="Resumo semanal" value={true} onChange={()=>{}}/>
          <Toggle label="🔒 Backup automático" sub="Dados na nuvem" value={false} onChange={()=>{}}/>
        </Card>
        <Card style={{padding:'18px',marginBottom:12,background:`linear-gradient(135deg,${G.navy},${G.navy3})`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:'#fff'}}>Plano Professional</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.5)',marginTop:3}}>Acesso ilimitado</div>
            </div>
            <Tag label="● Ativo" bg={G.green}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {['📋 Propostas ilimitadas','💰 Comissões','⏰ Agenda','📁 Material'].map(f=>
              <div key={f} style={{background:'rgba(255,255,255,0.07)',borderRadius:10,padding:'10px',textAlign:'center'}}>
                <div style={{fontSize:11,color:'rgba(255,255,255,0.65)',lineHeight:1.4}}>{f}</div>
              </div>
            )}
          </div>
        </Card>
      </div>
      <div style={{textAlign:'center',fontSize:11,color:G.slate400,paddingTop:4}}>POUP v2.0.0 • Feito para corretores 🏠</div>
    </div>
  </div>;
}

/* ─── APP ROOT ────────────────────────────────────────────── */
function App(){
  const[screen,setScreen]=useState('home');
  const[selectedReport,setSelectedReport]=useState(null);
  const[col,setCol]=useState(false);
  const{settings}=useApp();
  const go=s=>{setSelectedReport(null);setScreen(s);};
  const nav=s=>{if(s==='newReport'){setScreen('newReport');return;}go(s);};
  const viewReport=r=>{setSelectedReport(r);setScreen('reportDetail');};
  const showBottomNav=['home','reports','commissions','reminders','settings'].includes(screen);
  return<div className="app-layout" style={{display:'flex',flexDirection:'column',height:'100dvh',overflow:'hidden'}}>
    <Sidebar screen={screen} onNav={nav} settings={settings} col={col} setCol={setCol}/>
    <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:G.slate50}}>
      {screen==='home'&&<HomeScreen onNav={nav} onViewReport={viewReport}/>}
      {screen==='reports'&&<ReportsScreen onNav={nav} onViewReport={viewReport}/>}
      {screen==='reportDetail'&&<ReportDetailScreen report={selectedReport} onBack={()=>go('reports')}/>}
      {screen==='newReport'&&<NewReportScreen onBack={()=>go('home')} onSaved={()=>go('reports')}/>}
      {screen==='commissions'&&<CommissionsScreen/>}
      {screen==='reminders'&&<RemindersScreen/>}
      {screen==='settings'&&<SettingsScreen/>}
    </main>
    {showBottomNav&&<BottomNav screen={screen} onNav={nav}/>}
  </div>;
}
function Root(){return<AppProvider><App/></AppProvider>;}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
